name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Unit and integration tests
        run: pytest -q

      - name: CLI dry-run
        run: python scripts/hermes_autoresearch.py --config examples/autoresearch.generic-python.yaml --dry-run

      - name: Installer dry-run
        run: python scripts/install_hermes_skill.py --profile coder --category software-development --dry-run
